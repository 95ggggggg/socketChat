spring:
  application:
    name: socket-chat
  datasource:
    url: jdbc:h2:mem:socketchat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  security:
    jwt:
      secret: "change-this-secret-key-for-real-projects-change-this-secret-key"
      access-expiration-minutes: 30
      refresh-expiration-days: 14
